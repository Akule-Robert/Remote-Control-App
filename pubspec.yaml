name: wifi_tv_remote
description: WiFi TV Remote Control app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  provider: ^6.1.2
  # Networking
  http: ^1.2.2
  web_socket_channel: ^3.0.2
  # Video / screen mirroring
  video_player: ^2.9.5
  # Voice input
  speech_to_text: ^7.0.0
  # Permissions
  permission_handler: ^11.3.1
  # Shared preferences (settings persistence)
  shared_preferences: ^2.3.5
  # Network info
  network_info_plus: ^6.1.3
  protobuf: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
